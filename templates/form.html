<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo link Shopee</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            color: #1f2937;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 680px;
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin: 0 0 8px;
            font-size: 28px;
            text-align: center;
            color: #111827;
        }

        .desc {
            margin: 0 0 24px;
            text-align: center;
            color: #6b7280;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
            background: #fff;
        }

        input:focus,
        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 700;
            background: #2563eb;
            color: white;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        .result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
        }

        .result h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #1e3a8a;
        }

        .result a {
            color: #2563eb;
            text-decoration: none;
            word-break: break-all;
            font-weight: 600;
        }

        .result a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .card {
                padding: 18px;
                border-radius: 14px;
            }

            h2 {
                font-size: 22px;
            }

            .desc {
                font-size: 14px;
                margin-bottom: 20px;
            }

            input,
            textarea,
            button {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .wrapper {
                padding: 12px;
            }

            .card {
                padding: 16px;
            }

            h2 {
                font-size: 20px;
            }

            label {
                font-size: 13px;
            }

            input,
            textarea {
                padding: 12px 14px;
            }

            button {
                padding: 13px 14px;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2>Tạo link Shopee</h2>
        <p class="desc">Nhập thông tin bên dưới để tạo link mới.</p>

        <form method="POST" action="/create">
            <div class="form-group">
                <label for="image_url">URL ảnh</label>
                <input id="image_url" name="image_url" placeholder="Nhập URL ảnh" required>
            </div>

            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" placeholder="Nhập nội dung" required></textarea>
            </div>

            <div class="form-group">
                <label for="shopee_url">URL Shopee</label>
                <input id="shopee_url" name="shopee_url" placeholder="Nhập URL Shopee" required>
            </div>

            <button type="submit">Submit</button>
        </form>

        {% if link %}
        <div class="result">
            <h3>Link đã tạo:</h3>
            <a href="{{ link }}" target="_blank">{{ link }}</a>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
